name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore TimeManager.slnx
      - name: Build
        run: dotnet build TimeManager.slnx -c Release --no-restore
      - name: Test
        run: dotnet test TimeManager.Tests/TimeManager.Tests.csproj -c Release --no-build --verbosity normal

  documentation:
    name: Documentation
    runs-on: windows-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - name: Build project with XML docs
        run: |
          dotnet build TimeManager/TimeManager.csproj -c Release -p:GenerateDocumentationFile=true -p:DocumentationFile=bin/Release/net10.0-windows/TimeManager.xml --no-restore
      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation-xml
          path: |
            TimeManager/bin/Release/net10.0-windows/TimeManager.xml
            TimeManager/bin/Release/net10.0-windows/TimeManager.pdb
