name: Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - name: Install docfx
        run: dotnet tool install -g docfx.console
      - name: Add dotnet tools to PATH
        run: echo "%USERPROFILE%\\.dotnet\\tools" >> $GITHUB_PATH
        shell: cmd
      - name: Restore and build project with XML docs
        run: |
          dotnet build TimeManager/TimeManager.csproj -c Release -p:GenerateDocumentationFile=true -p:DocumentationFile=bin/Release/net10.0-windows/TimeManager.xml --no-restore
      - name: Run docfx metadata
        run: docfx metadata docs/docfx.json
      - name: Run docfx build
        run: docfx build docs/docfx.json -o docs/_site
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_site
